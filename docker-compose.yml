services:
  subx:
    image: ghcr.io/<your-github-user-or-org>/subx:latest
    container_name: subx
    restart: unless-stopped

    # 如果目录权限有问题，可启用以下其一
    # user: "0:0"
    # user: "1000:1000"

    ports:
      - "3000:3000"

    volumes:
      # 媒体目录（如需更安全可加 :ro；若需要同目录输出字幕请不要加 :ro）
      - /path/to/your/media:/media
      # 数据目录（SQLite 持久化）
      - ./data/db:/app/db
      # 可选：保留临时日志方便排查
      - ./data/temp:/app/temp

    environment:
      VIDEO_DIR: /media
      DB_PATH: /app/db/subx.db
      TZ: ${TZ:-Asia/Shanghai}

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    mem_limit: 2g
    cpus: "2.0"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
